name: Refresh stats

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'   # weekly, Monday morning UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate stats card
        run: node .github/scripts/stats.mjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
          GH_USER: RPlante28
      - name: Commit if changed
        run: |
          git config user.name "Rohan Plante"
          git config user.email "rohan.plante1@marist.edu"
          git add README.md stats.svg calendar.svg rank.svg
          git diff --staged --quiet || git commit -m "chore: refresh GitHub stats [skip ci]"
          git push
